<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>NPS Survey</title>
<style>
@font-face {
font-family: 'Aeonik 212';
src: url('https://d2iuv7nw9pip8z.cloudfront.net/assets/AeonikPro350-DCQqRfId.ttf') format('truetype');
font-weight: 350;
font-display: swap;
}


*,
*::before,
*::after {
box-sizing: border-box;
margin: 0;
padding: 0;
}

:root {
--brand: #00A7E1;
--brand-hover: #0096CC;
--brand-glow: rgba(0, 167, 225, 0.30);
--brand-light: rgba(0, 167, 225, 0.08);
--brand-muted: #dce8f5;
--text-dark: #1c1c2e;
--text-mid: #6b7280;
--text-light: #9ca3af;
--border: #e5e7eb;
--surface: #f6f7f8;
--white: #ffffff;
--positive: #00A971;
--positive-bg: #e6f7f0;
--negative: #FF5252;
--passive: #F59E0B;
--radius-sheet: 20px;
--radius-btn: 26px;
--radius-input: 12px;
--shadow-sheet: 0 -8px 40px rgba(0, 0, 0, 0.18);
}

html,
body {
height: 100%;
font-family: 'Aeonik 212', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif;
background: transparent;
-webkit-font-smoothing: antialiased;
-moz-osx-font-smoothing: grayscale;
overflow: hidden;
position: fixed;
width: 100%;
}

.overlay {
position: fixed;
top: 0;
left: 0;
right: 0;
bottom: 0;
display: flex;
align-items: flex-end;
justify-content: center;
background: rgba(0, 0, 0, 0.45);
backdrop-filter: blur(4px);
-webkit-backdrop-filter: blur(4px);
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
transition: padding-bottom 0.3s ease;
}

.sheet {
position: relative;
width: 100%;
max-width: 480px;
background: var(--white);
border-radius: var(--radius-sheet) var(--radius-sheet) 0 0;
box-shadow: var(--shadow-sheet);
padding: 0 0 env(safe-area-inset-bottom, 16px);
animation: slideUp 0.38s cubic-bezier(0.34, 1.36, 0.64, 1) both;
overflow: visible;
margin-bottom: 0;
margin-top: auto;
max-height: 90vh;
display: flex;
flex-direction: column;
}

@keyframes slideUp {
from {
transform: translateY(100%);
opacity: 0;
}

to {
transform: translateY(0);
opacity: 1;
}
}

.handle {
display: none;
}

.handle span {
display: none;
}

.inner {
padding: 18px 20px 20px;
overflow-y: auto;
-webkit-overflow-scrolling: touch;
}

.header {
text-align: center;
margin-bottom: 18px;
}

.header h2 {
font-size: 18px;
font-weight: 700;
color: var(--text-dark);
letter-spacing: -0.3px;
}

.header p {
font-size: 13px;
color: var(--text-mid);
margin-top: 4px;
line-height: 1.5;
}

.question {
font-size: 14px;
font-weight: 600;
color: var(--text-dark);
text-align: center;
margin-bottom: 14px;
line-height: 1.5;
}

/* ---- NPS score grid ---- */
.nps-grid {
display: grid;
grid-template-columns: repeat(5, 1fr);
gap: 8px;
margin-bottom: 6px;
}

.nps-btn {
aspect-ratio: 1;
border-radius: 50%;
border: 1.5px solid var(--border);
background: var(--white);
font-size: 14px;
font-weight: 600;
color: var(--text-mid);
cursor: pointer;
transition: all 0.15s ease;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
outline: none;
}

.nps-btn:hover {
border-color: var(--brand);
color: var(--brand);
background: var(--brand-light);
}

.nps-btn.selected {
border-color: var(--brand);
background: var(--brand);
color: var(--white);
transform: scale(1.08);
box-shadow: 0 4px 14px var(--brand-glow);
}

/* Detractors: 1-6 — red */
.nps-btn[data-score="1"].selected,
.nps-btn[data-score="2"].selected,
.nps-btn[data-score="3"].selected,
.nps-btn[data-score="4"].selected,
.nps-btn[data-score="5"].selected,
.nps-btn[data-score="6"].selected {
background: var(--negative);
border-color: var(--negative);
box-shadow: 0 4px 14px rgba(255, 82, 82, 0.30);
}

/* Passives: 7-8 — amber */
.nps-btn[data-score="7"].selected,
.nps-btn[data-score="8"].selected {
background: var(--passive);
border-color: var(--passive);
box-shadow: 0 4px 14px rgba(245, 158, 11, 0.30);
}

/* Promoters: 9-10 stay brand cyan (default .selected) */

.scale-labels {
display: flex;
justify-content: space-between;
margin-bottom: 18px;
}

.scale-labels span {
font-size: 10.5px;
color: var(--text-light);
font-weight: 500;
}

/* ---- Divider ---- */
.divider {
height: 1px;
background: var(--border);
margin: 0 0 16px;
}

/* ---- Comment area ---- */
.context-label {
font-size: 13px;
font-weight: 600;
color: var(--text-dark);
margin-bottom: 8px;
min-height: 18px;
transition: opacity 0.2s;
}

textarea {
width: 100%;
border: 1.5px solid var(--border);
border-radius: var(--radius-input);
padding: 12px 14px;
font-family: inherit;
font-size: 14px;
color: var(--text-dark);
resize: none;
outline: none;
line-height: 1.5;
transition: border-color 0.2s;
background: var(--surface);
min-height: 76px;
max-height: 120px;
}

textarea:focus {
border-color: var(--brand);
background: var(--white);
}

textarea::placeholder {
color: var(--text-light);
}

/* ---- Submit CTA — pill button matching T212 primary style ---- */
.submit-btn {
width: 100%;
margin-top: 14px;
padding: 0;
height: 50px;
background: var(--brand);
color: var(--white);
border: none;
border-radius: var(--radius-btn);
font-family: inherit;
font-size: 16px;
font-weight: 600;
cursor: pointer;
letter-spacing: 0.1px;
transition: background 0.2s, transform 0.1s;
-webkit-tap-highlight-color: transparent;
outline: none;
}

.submit-btn:hover {
background: var(--brand-hover);
}

.submit-btn:active {
transform: scale(0.98);
}

.submit-btn:disabled {
background: var(--brand-muted);
color: rgba(0, 0, 0, 0.22);
cursor: not-allowed;
}

/* ---- Success state ---- */
.success-screen {
display: none;
flex-direction: column;
align-items: center;
justify-content: center;
padding: 32px 20px 28px;
text-align: center;
animation: fadeIn 0.35s ease both;
}

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(10px);
}

to {
opacity: 1;
transform: none;
}
}

.success-icon {
width: 64px;
height: 64px;
background: var(--positive-bg);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
margin-bottom: 16px;
}

.success-icon svg {
width: 30px;
height: 30px;
}

.success-screen h3 {
font-size: 18px;
font-weight: 700;
color: var(--text-dark);
margin-bottom: 6px;
}

.success-screen p {
font-size: 13px;
color: var(--text-mid);
line-height: 1.5;
}

/* ---- Close button ---- */
.close-row {
position: absolute;
top: 14px;
right: 14px;
z-index: 5;
}

.close-btn {
width: 30px;
height: 30px;
border-radius: 50%;
border: none;
background: var(--surface);
color: var(--text-light);
font-size: 15px;
line-height: 1;
cursor: pointer;
display: flex;
align-items: center;
justify-content: center;
-webkit-tap-highlight-color: transparent;
outline: none;
transition: background 0.15s, color 0.15s;
}

.close-btn:hover {
background: var(--border);
color: var(--text-mid);
}
</style>
</head>

<body>

<div class="overlay" id="overlay">
<div class="sheet" id="sheet">

<div class="close-row">
<button class="close-btn" onclick="closeSheet()" aria-label="Close">✕</button>
</div>

<div id="survey-form">
<div class="handle"><span></span></div>
<div class="inner">

<div class="header">
<h2>Share your feedback</h2>
<p>One tap and an optional comment.</p>
</div>

<div class="question">How likely are you to recommend Trading 212 to a friend or colleague?</div>

<div class="nps-grid" id="nps-grid">
<button class="nps-btn" data-score="1" onclick="selectScore(1)">1</button>
<button class="nps-btn" data-score="2" onclick="selectScore(2)">2</button>
<button class="nps-btn" data-score="3" onclick="selectScore(3)">3</button>
<button class="nps-btn" data-score="4" onclick="selectScore(4)">4</button>
<button class="nps-btn" data-score="5" onclick="selectScore(5)">5</button>
<button class="nps-btn" data-score="6" onclick="selectScore(6)">6</button>
<button class="nps-btn" data-score="7" onclick="selectScore(7)">7</button>
<button class="nps-btn" data-score="8" onclick="selectScore(8)">8</button>
<button class="nps-btn" data-score="9" onclick="selectScore(9)">9</button>
<button class="nps-btn" data-score="10" onclick="selectScore(10)">10</button>
</div>

<div class="scale-labels">
<span>Extremely Unlikely</span>
<span>Extremely Likely</span>
</div>

<div class="divider"></div>

<div class="context-label" id="context-label"></div>

<textarea id="comment-box" placeholder="Tell us more (optional)"
maxlength="500" rows="3"></textarea>

<button class="submit-btn" id="submit-btn" onclick="submitSurvey()" disabled>
Send feedback
</button>

</div>
</div>

<div class="success-screen" id="success-screen">
<div class="success-icon">
<svg viewBox="0 0 24 24" fill="none" stroke="#00A971" stroke-width="2.5" stroke-linecap="round"
stroke-linejoin="round">
<polyline points="20 6 9 17 4 12" />
</svg>
</div>
<h3>Thank you!</h3>
<p>Your feedback helps us focus on<br>what matters most.</p>
</div>

</div>
</div>

<script>
var selectedScore = null;
var hasSubmitted = false;
var isClosing = false;

function getContextLabel(score) {
if (score <= 6) return "\u{1F61F} What could we do better?";
if (score <= 8) return "\u{1F642} Thanks! What would make it a 10?";
return "\u{1F389} Great to hear! What do you like most?";
}

function selectScore(score) {
selectedScore = score;
var btns = document.querySelectorAll('.nps-btn');
btns.forEach(function (btn) {
btn.classList.toggle('selected', parseInt(btn.dataset.score) === score);
});
document.getElementById('context-label').textContent = getContextLabel(score);
document.getElementById('submit-btn').disabled = false;
}

function submitSurvey() {
if (selectedScore === null) return;

var btn = document.getElementById('submit-btn');
if (btn.disabled) return;
btn.disabled = true;

var eventName = "NPS Survey Submitted";
var comment = document.getElementById('comment-box').value.trim();

var eventProps = {
nps_rating: selectedScore.toString(),
comments: comment || ""
};

var message = {
action: "recordEventWithProps",
event: eventName,
properties: eventProps,
};

if (window.CleverTap) {
CleverTap.pushEvent(eventName, JSON.stringify(eventProps));
} else if (
window.webkit &&
window.webkit.messageHandlers &&
window.webkit.messageHandlers.clevertap
) {
window.webkit.messageHandlers.clevertap.postMessage(message);
} else {
if (typeof clevertap !== 'undefined' && clevertap.event) {
clevertap.event.push(eventName, eventProps);
}
}

document.getElementById('survey-form').style.display = 'none';
hasSubmitted = true;
var success = document.getElementById('success-screen');
success.style.display = 'flex';
setTimeout(closeSheet, 2400);
}

function closeSheet() {
if (isClosing) return;
isClosing = true;

if (!hasSubmitted) {
var dismissEvent = "NPS Survey Dismissed";
var dismissProps = {
score_selected: selectedScore !== null ? selectedScore.toString() : "none"
};
var dismissMessage = {
action: "recordEventWithProps",
event: dismissEvent,
properties: dismissProps,
};

console.log("DISMISS EVENT FIRING:", dismissEvent, dismissProps);

if (window.CleverTap) {
CleverTap.pushEvent(dismissEvent, JSON.stringify(dismissProps));
} else if (
window.webkit &&
window.webkit.messageHandlers &&
window.webkit.messageHandlers.clevertap
) {
window.webkit.messageHandlers.clevertap.postMessage(dismissMessage);
} else {
if (typeof clevertap !== 'undefined' && clevertap.event) {
clevertap.event.push(dismissEvent, dismissProps);
}
}
}

var sheet = document.getElementById('sheet');
sheet.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
sheet.style.transform = 'translateY(100%)';
sheet.style.opacity = '0';

setTimeout(function () {
document.getElementById('overlay').style.display = 'none';
if (window.CleverTap && typeof window.CleverTap.dismissInAppNotification === 'function') {
window.CleverTap.dismissInAppNotification();
} else {
window.location.href = 'wzrk://exit';
}
}, 400);
}

document.getElementById('overlay').addEventListener('click', function (e) {
if (e.target === this) closeSheet();
});

document.getElementById('comment-box').addEventListener('focus', function () {
setTimeout(function () {
document.getElementById('comment-box').scrollIntoView({ behavior: 'smooth', block: 'center' });
}, 300);
});

// Android keyboard fix using visualViewport API
if (window.visualViewport) {
window.visualViewport.addEventListener('resize', function () {
var overlay = document.getElementById('overlay');
var keyboardHeight = window.innerHeight - window.visualViewport.height;
if (keyboardHeight > 100) {
overlay.style.paddingBottom = keyboardHeight + 'px';
overlay.style.alignItems = 'flex-start';
overlay.style.overflowY = 'auto';
setTimeout(function () {
document.getElementById('comment-box').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}, 100);
} else {
overlay.style.paddingBottom = '0';
overlay.style.alignItems = 'flex-end';
}
});
}
</script>
</body>

</html>
